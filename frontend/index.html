<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMind — RAG Chatbot</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&family=Be+Vietnam+Pro:wght@400;500;600&family=Fira+Code&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0d0f12;
            --surface: #13161b;
            --surface2: #1a1e25;
            --border: rgba(255, 255, 255, 0.07);
            --border-bright: rgba(255, 255, 255, 0.14);
            --accent: #7ee8a2;
            --accent2: #4fd1c5;
            --text: #e8eaed;
            --text-muted: #6b7280;
            --text-dim: #9ca3af;
            --user-bubble: #1e2d24;
            --bot-bubble: #161a22;
            --danger: #f87171;
            --font-display: 'DM Serif Display', serif;
            --font-ui: 'Syne', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 272px;
            min-width: 272px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: -80px;
            left: -80px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(126, 232, 162, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo-title {
            font-family: var(--font-display);
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .6;
                transform: scale(.85);
            }
        }

        .logo-sub {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-top: 3px;
            font-family: var(--font-mono);
        }

        /* TABS */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 12px;
        }

        .tab {
            flex: 1;
            padding: 10px 4px;
            font-size: 11px;
            letter-spacing: .08em;
            text-transform: uppercase;
            font-family: var(--font-mono);
            color: var(--text-muted);
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all .15s;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* TAB PANELS */
        .tab-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .tab-panel.active {
            display: flex;
        }

        /* DOCS PANEL */
        .upload-wrap {
            padding: 14px 14px 10px;
        }

        .section-label {
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
            font-family: var(--font-mono);
        }

        .drop-zone {
            border: 1.5px dashed var(--border-bright);
            border-radius: 10px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            background: rgba(255, 255, 255, .015);
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(126, 232, 162, .04);
        }

        .drop-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon {
            font-size: 22px;
            margin-bottom: 5px;
            display: block;
            opacity: .6;
        }

        .drop-text {
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .drop-text span {
            color: var(--accent);
            font-weight: 600;
        }

        .upload-status {
            margin-top: 8px;
            font-size: 11px;
            font-family: var(--font-mono);
            padding: 7px 10px;
            border-radius: 6px;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .upload-status.loading {
            display: flex;
            background: rgba(126, 232, 162, .06);
            color: var(--accent);
            border: 1px solid rgba(126, 232, 162, .15);
        }

        .upload-status.success {
            display: flex;
            background: rgba(126, 232, 162, .06);
            color: var(--accent);
            border: 1px solid rgba(126, 232, 162, .15);
        }

        .upload-status.error {
            display: flex;
            background: rgba(248, 113, 113, .06);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, .15);
        }

        .spinner {
            width: 11px;
            height: 11px;
            border: 1.5px solid rgba(126, 232, 162, .3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .docs-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 14px 14px;
        }

        .docs-list::-webkit-scrollbar {
            width: 3px;
        }

        .docs-list::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 2px;
        }

        .doc-item {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 9px;
            border-radius: 7px;
            margin-bottom: 3px;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
            animation: fadeIn .3s ease;
            transition: all 0.2s;
        }

        .doc-item.processing {
            opacity: 0.6;
            border-style: dashed;
            background: rgba(126, 232, 162, 0.02);
        }

        .spinner-small {
            width: 10px;
            height: 10px;
            border: 1.5px solid rgba(126, 232, 162, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        .badge-purple {
            background: rgba(167, 139, 250, 0.1);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        .doc-name {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        /* CHATS PANEL */
        .new-chat-btn {
            margin: 12px 14px 8px;
            padding: 9px 14px;
            background: rgba(126, 232, 162, .08);
            border: 1px solid rgba(126, 232, 162, .2);
            border-radius: 8px;
            color: var(--accent);
            font-size: 12px;
            font-family: var(--font-ui);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all .15s;
            width: calc(100% - 28px);
        }

        .new-chat-btn:hover {
            background: rgba(126, 232, 162, .13);
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px;
        }

        .sessions-list::-webkit-scrollbar {
            width: 3px;
        }

        .sessions-list::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 2px;
        }

        .session-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 10px;
            border-radius: 8px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: all .15s;
            border: 1px solid transparent;
        }

        .session-item:hover {
            background: var(--surface2);
            border-color: var(--border);
        }

        .session-item.active {
            background: var(--surface2);
            border-color: rgba(126, 232, 162, .2);
        }

        .session-icon {
            font-size: 13px;
            flex-shrink: 0;
            opacity: .6;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 12px;
            color: var(--text-dim);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .session-item.active .session-title {
            color: var(--text);
        }

        .session-time {
            font-size: 10px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: 1px;
        }

        .session-del {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 12px;
            transition: all .15s;
            flex-shrink: 0;
        }

        .session-item:hover .session-del {
            opacity: 1;
        }

        .session-del:hover {
            color: var(--danger);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .main::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .015) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
            background: rgba(13, 15, 18, .85);
            backdrop-filter: blur(8px);
        }

        .chat-title {
            font-family: var(--font-display);
            font-size: 17px;
        }

        .chat-title em {
            color: var(--accent);
            font-style: italic;
        }

        .header-session {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            background: var(--surface2);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            z-index: 1;
        }

        .messages::-webkit-scrollbar {
            width: 3px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 2px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: .4;
            pointer-events: none;
            margin: auto;
        }

        .empty-icon {
            font-family: var(--font-display);
            font-size: 52px;
            font-style: italic;
            color: var(--text-muted);
            line-height: 1;
        }

        .empty-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
            max-width: 220px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: msgIn .22s ease;
            max-width: 88%;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .avatar {
            background: rgba(126, 232, 162, .15);
            border: 1px solid rgba(126, 232, 162, .25);
            color: var(--accent);
        }

        .message.bot .avatar {
            background: var(--surface2);
            border: 1px solid var(--border);
            font-family: var(--font-display);
            font-style: italic;
            color: var(--text-dim);
            font-size: 14px;
        }

        .bubble-wrap {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bubble {
            padding: 11px 15px;
            border-radius: 12px;
            font-size: 13.5px;
            line-height: 1.65;
        }

        /* Markdown Content Styles */
        .bubble table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.05);
        }

        .bubble th,
        .bubble td {
            border: 1px solid var(--border);
            padding: 8px;
            text-align: left;
        }

        .bubble th {
            background: rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }

        .bubble code {
            font-family: 'Fira Code', monospace;
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .bubble pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .bubble blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            margin: 10px 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .bubble ul,
        .bubble ol {
            padding-left: 20px;
            margin: 10px 0;
        }

        .bubble li {
            margin-bottom: 4px;
        }

        .bubble p {
            margin-bottom: 10px;
        }

        .bubble p:last-child {
            margin-bottom: 0;
        }

        .bot .bubble table {
            background: rgba(255, 255, 255, 0.05);
        }

        .bot .bubble th {
            background: rgba(255, 255, 255, 0.1);
        }

        .bot .bubble code {
            background: rgba(255, 255, 255, 0.1);
        }

        .bot .bubble blockquote {
            color: #cbd5e1;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            border: 1px solid rgba(126, 232, 162, .15);
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            font-family: var(--font-body);
            line-height: 1.62;
        }

        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 13px 15px;
        }

        .typing span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.2s ease-in-out infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: .2s;
        }

        .typing span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: .4;
            }

            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        .sources {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 2px;
        }

        .source-tag {
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--accent2);
            background: rgba(79, 209, 197, .07);
            border: 1px solid rgba(79, 209, 197, .18);
            padding: 2px 7px;
            border-radius: 4px;
        }

        .input-area {
            padding: 14px 24px 18px;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 1;
            background: rgba(13, 15, 18, .9);
            backdrop-filter: blur(8px);
        }

        .input-row {
            display: flex;
            gap: 9px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 15px;
            color: var(--text);
            font-size: 13.5px;
            font-family: var(--font-ui);
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 120px;
            min-height: 44px;
            transition: border-color .15s;
            display: block;
            width: 100%;
        }

        textarea:focus {
            border-color: rgba(126, 232, 162, .3);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .15s;
            color: #0d0f12;
        }

        .send-btn:hover {
            background: #6ee09a;
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 17px;
            height: 17px;
        }

        .input-hint {
            font-size: 10px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: 7px;
            display: flex;
            gap: 12px;
        }

        .hint-key {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 9px;
        }

        .toast {
            position: fixed;
            bottom: 22px;
            right: 22px;
            background: var(--surface2);
            border: 1px solid var(--border-bright);
            color: var(--text);
            font-size: 12px;
            padding: 9px 14px;
            border-radius: 8px;
            font-family: var(--font-mono);
            z-index: 999;
            transform: translateY(60px);
            opacity: 0;
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
            pointer-events: none;
            max-width: 280px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.accent {
            border-color: rgba(126, 232, 162, .3);
            color: var(--accent);
        }

        .toast.error-toast {
            border-color: rgba(248, 113, 113, .3);
            color: var(--danger);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* AUTH & FILTER */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(13, 15, 18, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            width: 340px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1;
            padding: 8px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            font-family: var(--font-ui);
        }

        .auth-tab.active {
            background: rgba(126, 232, 162, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .auth-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            color: var(--text);
            outline: none;
        }

        .auth-box input:focus {
            border-color: var(--accent);
        }

        .auth-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: var(--font-ui);
            margin-top: 5px;
        }

        .auth-btn:hover {
            background: #6ee09a;
        }

        .auth-status {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            font-family: var(--font-mono);
        }

        .filter-row {
            margin-bottom: 10px;
        }

        .filter-row input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text);
            font-size: 12px;
            outline: none;
        }

        .filter-row input:focus {
            border-color: var(--accent2);
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            margin-left: auto;
        }

        .logout-btn:hover {
            color: var(--danger);
            border-color: rgba(248, 113, 113, 0.3);
        }

        /* ── FILE SCOPE DROPDOWN ── */
        .file-scope-bar {
            position: relative;
            margin-bottom: 8px;
        }

        .scope-trigger {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 12px;
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--text-muted);
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all .15s;
            outline: none;
            box-sizing: border-box;
        }

        .scope-trigger:hover {
            border-color: var(--border-bright);
            color: var(--text-dim);
        }

        .scope-trigger.active {
            border-color: rgba(79, 209, 197, .4);
            color: var(--accent2);
        }

        .scope-trigger #scopeLabel {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .scope-arrow {
            transition: transform .2s;
            flex-shrink: 0;
            opacity: .5;
        }

        .scope-arrow.open {
            transform: rotate(180deg);
            opacity: 1;
        }

        .scope-dropdown {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border-bright);
            border-radius: 10px;
            overflow: hidden;
            z-index: 500;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, .5);
            max-height: 260px;
            display: flex;
            flex-direction: column;
            transition: opacity .15s, visibility .15s, transform .15s;
            transform: translateY(4px);
        }

        .scope-dropdown.open {
            visibility: visible;
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .scope-dropdown-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface2);
        }

        .scope-ctrl-btn {
            font-size: 10px;
            font-family: var(--font-mono);
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all .15s;
        }

        .scope-ctrl-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .scope-cb-list {
            overflow-y: auto;
        }

        .scope-cb-list::-webkit-scrollbar {
            width: 3px;
        }

        .scope-cb-list::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 2px;
        }

        .scope-cb-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 12px;
            cursor: pointer;
            transition: background .12s;
            border-bottom: 1px solid var(--border);
        }

        .scope-cb-item:last-child {
            border-bottom: none;
        }

        .scope-cb-item:hover {
            background: var(--surface2);
        }

        .scope-cb-item input[type=checkbox] {
            accent-color: var(--accent);
            width: 13px;
            height: 13px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .scope-cb-item label {
            font-size: 11px;
            color: var(--text-muted);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            cursor: pointer;
            flex: 1;
            font-family: var(--font-mono);
            user-select: none;
            transition: color .12s;
        }

        .scope-cb-item:has(input:checked) {
            background: rgba(126, 232, 162, .04);
        }

        .scope-cb-item:has(input:checked) label {
            color: var(--accent);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- AUTH OVERLAY -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 class="auth-title">DocMind</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Đăng nhập</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Đăng ký</button>
            </div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <input type="text" id="authUsername" placeholder="Tên đăng nhập" required>
                <input type="email" id="authEmail" placeholder="Email" class="auth-extra hidden">
                <input type="password" id="authPassword" placeholder="Mật khẩu" required>
                <input type="password" id="authConfirmPassword" placeholder="Xác nhận mật khẩu"
                    class="auth-extra hidden">
                <button type="submit" class="auth-btn" id="authBtn">Đi tiếp</button>
                <div class="auth-status" id="authStatus"></div>
            </form>
        </div>
    </div>

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-title">
                <div class="logo-dot"></div>DocMind
            </div>
            <div class="logo-sub">RAG · Qdrant · Llama 3.3</div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chats')">Chats</button>
            <button class="tab" onclick="switchTab('docs')">Documents</button>
        </div>

        <!-- CHATS PANEL -->
        <div class="tab-panel active" id="panel-chats">
            <button class="new-chat-btn" onclick="newChat()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                New chat
            </button>
            <div class="sessions-list" id="sessionsList"></div>
        </div>

        <!-- DOCS PANEL -->
        <div class="tab-panel" id="panel-docs">
            <div class="upload-wrap">
                <span class="section-label">Upload PDF</span>
                <div class="drop-zone" id="dropZone">
                    <input type="file" accept=".pdf,.docx,.html" id="fileInput">
                    <span class="drop-icon">📄</span>
                    <div class="drop-text"><span>Chọn file</span> hoặc kéo thả</div>
                </div>
                <div class="upload-status" id="uploadStatus"></div>
            </div>
            <div class="section-label" style="padding:0 14px;">Đã upload</div>
            <div class="docs-list" id="docsList"></div>
        </div>
    </aside>

    <main class="main">
        <div class="chat-header">

            <div class="header-session" id="headerSession">Chưa có session</div>
            <button class="logout-btn" onclick="logout()">Đăng xuất</button>
        </div>

        <div class="messages" id="messages">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">?</div>
                <div class="empty-text">Tạo chat mới và upload tài liệu để bắt đầu</div>
            </div>
        </div>

        <div class="input-area">
            <!-- File scope dropdown -->
            <div class="file-scope-bar" id="fileScopeBar">
                <button class="scope-trigger" id="scopeTrigger" onclick="toggleScopeDropdown()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <path d="M4 6h16M7 12h10M10 18h4" />
                    </svg>
                    <span id="scopeLabel">Tất cả tài liệu</span>
                    <svg class="scope-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <polyline points="6 9 12 15 18 9" />
                    </svg>
                </button>
                <div class="scope-dropdown" id="scopeDropdown">
                    <div class="scope-dropdown-header">
                        <span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">Chọn tài liệu
                            để hỏi</span>
                        <div style="display:flex;gap:6px;">
                            <button onclick="selectAllDocs(true)" class="scope-ctrl-btn">All</button>
                            <button onclick="selectAllDocs(false)" class="scope-ctrl-btn">None</button>
                        </div>
                    </div>
                    <div id="scopeCheckboxList"></div>
                </div>
            </div>
            <div class="input-row">
                <textarea id="questionInput" placeholder="Hỏi về nội dung tài liệu..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <div class="input-hint">
                <span><span class="hint-key">Enter</span> gửi</span>
                <span><span class="hint-key">Shift+Enter</span> xuống dòng</span>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const API = 'http://localhost:8000';
        let currentSessionId = null;
        const uploadedDocs = [];
        let token = localStorage.getItem('token');
        let isLogin = true;

        // ── INIT & AUTH ──
        function initApp() {
            if (!token) {
                document.getElementById('authOverlay').style.display = 'flex';
                document.getElementById('authUsername').focus();
            } else {
                document.getElementById('authOverlay').style.display = 'none';
                loadSessions();
                loadDocuments(); // Thêm dòng này để load docs khi reload trang
            }
        }

        function authHeaders(isFormData = false) {
            const h = { 'Authorization': `Bearer ${token}` };
            if (!isFormData) h['Content-Type'] = 'application/json';
            return h;
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
            initApp();
        }

        function switchAuthTab(type) {
            isLogin = type === 'login';
            const tabs = document.querySelectorAll('.auth-tab');
            tabs.forEach(t => t.classList.remove('active'));
            if (isLogin) tabs[0].classList.add('active');
            else tabs[1].classList.add('active');

            document.getElementById('authBtn').textContent = isLogin ? 'Đăng nhập' : 'Đăng ký';
            document.getElementById('authStatus').textContent = '';

            // Xoa sach cac truong nhap
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authEmail').value = '';
            document.getElementById('authConfirmPassword').value = '';

            // An/Hien truong bo sung
            const extras = document.querySelectorAll('.auth-extra');
            extras.forEach(el => {
                el.classList.toggle('hidden', isLogin);
                el.required = !isLogin;
            });
        }

        async function handleAuth(e) {
            e.preventDefault();
            const u = document.getElementById('authUsername').value.trim();
            const p = document.getElementById('authPassword').value.trim();
            const email = document.getElementById('authEmail').value.trim();
            const confirmP = document.getElementById('authConfirmPassword').value.trim();
            const status = document.getElementById('authStatus');
            const btn = document.getElementById('authBtn');

            if (!isLogin && p !== confirmP) {
                status.style.color = 'var(--danger)';
                status.textContent = 'Mật khẩu xác nhận không khớp!';
                return;
            }

            // Kiểm tra định dạng Email
            if (!isLogin) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    status.style.color = 'var(--danger)';
                    status.textContent = 'Định dạng Email không hợp lệ!';
                    return;
                }
            }

            status.style.color = 'var(--text-muted)';
            status.textContent = 'Đang xử lý...';
            btn.disabled = true;

            try {
                if (isLogin) {
                    const fd = new FormData();
                    fd.append('username', u); fd.append('password', p);
                    const res = await fetch(`${API}/login`, { method: 'POST', body: fd });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || 'Sai tài khoản/mật khẩu');
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    if (data.is_admin) {
                        window.location.href = 'admin.html';
                    } else {
                        initApp();
                    }
                } else {
                    const res = await fetch(`${API}/register`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: u, password: p, email: email })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || 'Lỗi đăng ký');
                    status.style.color = '#7ee8a2';
                    status.textContent = 'Đăng ký thành công! Đang chuyển sang Đăng nhập...';
                    showToast('Tài khoản đã sẵn sàng!', 'accent');
                    setTimeout(() => {
                        switchAuthTab('login');
                    }, 1600);
                }
            } catch (e) {
                status.style.color = 'var(--danger)';
                status.textContent = e.message;
            }
            btn.disabled = false;
        }

        function handleApiError(res, data) {
            if (res.status === 401) { logout(); throw new Error("Phiên đăng nhập hết hạn."); }
            throw new Error(data?.detail || 'Lỗi server');
        }

        // ── TABS ──
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['chats', 'docs'][i] === name));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + name).classList.add('active');
        }

        // ── TEXTAREA ──
        const ta = document.getElementById('questionInput');
        ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; });
        ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

        // ── DRAG & DROP ──
        const dz = document.getElementById('dropZone');
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f?.type === 'application/pdf' || f?.name.endsWith('.docx') || f?.name.endsWith('.html')) uploadFile(f); else showToast('Chỉ hỗ trợ PDF, DOCX, HTML', 'error'); });
        document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });

        async function uploadFile(file) {
            const st = document.getElementById('uploadStatus');
            st.className = 'upload-status loading'; st.innerHTML = '<div class="spinner"></div> Đang gửi file...';
            const form = new FormData(); form.append('file', file);
            try {
                const res = await fetch(`${API}/ingest`, { method: 'POST', body: form, headers: authHeaders(true) });
                const data = await res.json();
                if (!res.ok) handleApiError(res, data);

                if (data.already_exists) {
                    st.className = 'upload-status success';
                    st.innerHTML = `✓ Tài liệu đã sẵn sàng!`;
                    showToast(`"${file.name}" đã tồn tại và sẵn sàng.`, 'accent');
                    loadDocuments();
                    setTimeout(() => { st.className = 'upload-status'; }, 4000);
                    return;
                }

                // Hiển thị trạng thái đang xử lý thay vì chunks_stored
                st.className = 'upload-status success';
                st.innerHTML = `✓ Đã nhận file. Đang xử lý ngầm...`;

                showToast(`Đang xử lý "${file.name}"...`, 'accent');

                // Polling nhẹ để cập nhật danh sách khi xong (tùy chọn, ở đây ta load lại Documents)
                setTimeout(() => loadDocuments(), 3000);

                // Tự động ẩn thông báo sau 10s (Dự phòng)
                setTimeout(() => { if (st.classList.contains('success')) st.className = 'upload-status'; }, 10000);

            } catch (err) {
                st.className = 'upload-status error';
                st.innerHTML = `✗ ${err.message}`;
                showToast(err.message, 'error');
            }
            document.getElementById('fileInput').value = '';
        }

        async function loadDocuments() {
            try {
                const res = await fetch(`${API}/documents`, { headers: authHeaders() });
                if (!res.ok) return;
                const data = await res.json();
                renderDocsList(data.documents || []);
            } catch { }
        }

        function renderDocsList(docs) {
            // Sidebar docs list
            const list = document.getElementById('docsList');
            let hasProcessing = false;

            if (list) {
                list.innerHTML = '';
                if (!docs.length) {
                    list.innerHTML = '<div style="padding:12px 14px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">Chưa có tài liệu</div>';
                } else {
                    docs.forEach(doc => {
                        if (doc.status === 'processing') hasProcessing = true;

                        const item = document.createElement('div');
                        item.className = 'doc-item' + (doc.status === 'processing' ? ' processing' : '');

                        let statusIcon = '📄';
                        if (doc.status === 'processing') statusIcon = '<div class="spinner-small"></div>';
                        else if (doc.status === 'failed') statusIcon = '<span title="Lỗi nạp file">⚠️</span>';

                        item.innerHTML = `<span>${statusIcon}</span><span class="doc-name" title="${doc.filename}">${doc.filename}</span>`;
                        list.appendChild(item);
                    });
                }
            }

            // Tự động ẩn thông báo global nếu không còn file nào đang xử lý
            const st = document.getElementById('uploadStatus');
            if (st && !hasProcessing && st.classList.contains('success')) {
                st.className = 'upload-status';
            }

            // Dropdown checkbox list (Chỉ cho phép chọn file đã completed)
            const cbList = document.getElementById('scopeCheckboxList');
            if (cbList) {
                cbList.className = 'scope-cb-list';
                cbList.innerHTML = '';
                const completedDocs = docs.filter(d => d.status === 'completed');

                if (!completedDocs.length) {
                    cbList.innerHTML = '<div style="padding:10px 12px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">Chưa có tài liệu sẵn sàng</div>';
                } else {
                    completedDocs.forEach(doc => {
                        const name = doc.filename;
                        const item = document.createElement('div');
                        item.className = 'scope-cb-item';
                        const id = 'cb-' + name.replace(/[^a-zA-Z0-9]/g, '_');
                        item.innerHTML = `<input type="checkbox" id="${id}" value="${name}" onchange="updateScopeLabel()"><label for="${id}">${name}</label>`;
                        cbList.appendChild(item);
                    });
                }
            }
            updateScopeLabel();

            // Nếu có file đang xử lý, tự động poll lại sau 5s
            if (hasProcessing) {
                if (window.docPollTimer) clearTimeout(window.docPollTimer);
                window.docPollTimer = setTimeout(() => loadDocuments(), 5000);
            }
        }

        function toggleScopeDropdown() {
            const dd = document.getElementById('scopeDropdown');
            const arrow = document.querySelector('.scope-arrow');
            const trigger = document.getElementById('scopeTrigger');
            const isOpen = dd.classList.contains('open');
            dd.classList.toggle('open', !isOpen);
            arrow.classList.toggle('open', !isOpen);
            trigger.classList.toggle('active', !isOpen);
        }

        // Đóng dropdown khi click ra ngoài
        document.addEventListener('click', e => {
            const bar = document.getElementById('fileScopeBar');
            if (bar && !bar.contains(e.target)) {
                document.getElementById('scopeDropdown')?.classList.remove('open');
                document.querySelector('.scope-arrow')?.classList.remove('open');
                document.getElementById('scopeTrigger')?.classList.remove('active');
            }
        });

        function selectAllDocs(checked) {
            document.querySelectorAll('#scopeCheckboxList input[type=checkbox]').forEach(cb => cb.checked = checked);
            updateScopeLabel();
        }

        function updateScopeLabel() {
            const selected = getSelectedFilenames();
            const label = document.getElementById('scopeLabel');
            const trigger = document.getElementById('scopeTrigger');
            if (!label) return;
            if (!selected || selected.length === 0) {
                label.textContent = 'Tất cả tài liệu';
                trigger?.classList.remove('active');
            } else if (selected.length === 1) {
                label.textContent = selected[0];
                trigger?.classList.add('active');
            } else {
                label.textContent = `${selected.length} tài liệu được chọn`;
                trigger?.classList.add('active');
            }
        }

        function getSelectedFilenames() {
            const checked = [...document.querySelectorAll('#scopeCheckboxList input[type=checkbox]:checked')];
            return checked.length > 0 ? checked.map(cb => cb.value) : null;
        }

        // ── SESSIONS ──
        async function loadSessions() {
            try {
                const res = await fetch(`${API}/sessions`, { headers: authHeaders() });
                const sessions = await res.json();
                if (!res.ok) handleApiError(res, sessions);
                renderSessions(sessions);
            } catch (e) { if (e.message) showToast(e.message, 'error'); }
        }

        function renderSessions(sessions) {
            const list = document.getElementById('sessionsList');
            list.innerHTML = '';
            if (!sessions.length) {
                list.innerHTML = '<div style="padding:16px 10px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);text-align:center;">Chưa có cuộc trò chuyện</div>';
                return;
            }
            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                item.dataset.id = s.id;
                const date = new Date(s.created_at);
                const timeStr = date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
                item.innerHTML = `
      <span class="session-icon">💬</span>
      <div class="session-info">
        <div class="session-title">${escHtml(s.title)}</div>
        <div class="session-time">${timeStr}</div>
      </div>
      <button class="session-del" onclick="deleteSession(event,'${s.id}')">✕</button>
    `;
                item.addEventListener('click', () => loadSession(s.id, s.title));
                list.appendChild(item);
            });
        }

        async function loadSession(id, title) {
            currentSessionId = id;
            document.getElementById('headerSession').textContent = title;
            document.querySelectorAll('.session-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));

            try {
                const res = await fetch(`${API}/history/${id}`, { headers: authHeaders() });
                const data = await res.json();
                if (!res.ok) handleApiError(res, data);
                const container = document.getElementById('messages');
                container.innerHTML = '';
                if (!data.messages.length) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">?</div><div class="empty-text">Chưa có tin nhắn trong session này</div></div>';
                    return;
                }
                data.messages.forEach(m => {
                    appendMessage(m.role === 'user' ? 'user' : 'bot', m.content);
                });
            } catch (e) { showToast(e.message, 'error') }
        }

        function newChat() {
            const id = 'session-' + Date.now();
            currentSessionId = id;
            document.getElementById('headerSession').textContent = id;
            document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">?</div><div class="empty-text">Bắt đầu đặt câu hỏi về tài liệu</div></div>';
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            document.getElementById('questionInput').focus();
        }

        async function deleteSession(e, id) {
            e.stopPropagation();
            try {
                const res = await fetch(`${API}/history/${id}`, { method: 'DELETE', headers: authHeaders() });
                if (!res.ok) {
                    const data = await res.json();
                    handleApiError(res, data);
                }
                if (currentSessionId === id) {
                    currentSessionId = null;
                    document.getElementById('headerSession').textContent = 'Chưa có session';
                    document.getElementById('messages').innerHTML = '<div class="empty-state"><div class="empty-icon">?</div><div class="empty-text">Tạo chat mới và upload tài liệu để bắt đầu</div></div>';
                }
                loadSessions();
                showToast('Đã xóa session', 'accent');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── CHAT SSE STREAMING ──
        async function sendMessage() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;
            if (!currentSessionId) { currentSessionId = 'session-' + Date.now(); document.getElementById('headerSession').textContent = currentSessionId; }

            let filenamesArr = getSelectedFilenames();

            document.getElementById('emptyState')?.remove();
            appendMessage('user', question);
            input.value = ''; input.style.height = 'auto';

            const container = document.getElementById('messages');
            const id = 'typing-' + Date.now();
            const wrap = document.createElement('div'); wrap.className = 'message bot'; wrap.id = id;
            wrap.innerHTML = `<div class="avatar">D</div><div class="bubble-wrap"><div class="bubble" id="bubble-${id}"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;

            document.getElementById('sendBtn').disabled = true;

            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ question, session_id: currentSessionId, top_k: 5, filenames: filenamesArr }),
                });

                if (!res.ok) {
                    let errData;
                    try { errData = await res.json() } catch (e) { }
                    handleApiError(res, errData || { detail: `HTTP ${res.status}` });
                }

                // Streaming Reader
                const reader = res.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let done = false;
                let buffer = "";
                let isFirstChunk = true;
                let bubbleElem = document.getElementById(`bubble-${id}`);

                while (!done) {
                    const { value, done: doneReading } = await reader.read();
                    done = doneReading;
                    if (value) {
                        buffer += decoder.decode(value, { stream: true });
                        let parts = buffer.split('\n\n');
                        buffer = parts.pop();

                        for (let part of parts) {
                            if (part.startsWith('data: ')) {
                                const dataStr = part.slice(6);
                                if (dataStr === '[DONE]') break;

                                try {
                                    const dataO = JSON.parse(dataStr);
                                    if (dataO.type === 'meta') {
                                        if (dataO.sources && dataO.sources.length) {
                                            const sourcesHtml = `<div class="sources">${dataO.sources.map(s => `<span class="source-tag">📎 ${s}</span>`).join('')}</div>`;
                                            wrap.querySelector('.bubble-wrap').insertAdjacentHTML('beforeend', sourcesHtml);
                                        }
                                    } else if (dataO.type === 'text') {
                                        if (isFirstChunk) {
                                            bubbleElem.innerHTML = '';
                                            isFirstChunk = false;
                                            bubbleElem._typingQueue = "";
                                            bubbleElem._isTyping = false;
                                        }
                                        bubbleElem._typingQueue += dataO.chunk || "";
                                        if (!bubbleElem._isTyping) startTyping(bubbleElem);
                                    }
                                } catch (e) {
                                    console.error("Parse SSE error:", e);
                                }
                            }
                        }
                    }
                }
                loadSessions();
            } catch (err) {
                const bubbleElem = document.getElementById(`bubble-${id}`);
                if (bubbleElem) bubbleElem.innerHTML = `<span style="color:var(--danger)">⚠️ ${err.message}</span>`;
            }
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        // Ham thuc hien hieu ung danh may (Typing Effect) voi toc do linh hoat
        function startTyping(el) {
            if (el._isTyping || !el._typingQueue) return;
            el._isTyping = true;
            el._lineCount = 0;

            const process = () => {
                if (el._typingQueue.length > 0) {
                    const char = el._typingQueue.charAt(0);
                    el._typingQueue = el._typingQueue.substring(1);

                    if (!el._rawText) el._rawText = "";
                    el._rawText += char;
                    if (char === '\n') el._lineCount++;
                    el.innerHTML = marked.parse(el._rawText);

                    // Cuon xuong cuoi
                    const container = document.getElementById('messages');
                    container.scrollTop = container.scrollHeight;

                    // Tinh toan delay linh hoat: 
                    // - Neu hang doi qua dai (>300 ky tu): chay cuc nhanh (2ms)
                    // - Neu da viet qua 6 dong: chay nhanh hon (5ms)
                    // - Binh thuong: 15ms
                    let delay = 15;
                    if (el._typingQueue.length > 300) delay = 2;
                    else if (el._lineCount > 6) delay = 5;

                    setTimeout(process, delay);
                } else {
                    el._isTyping = false;
                    // Fix: parse mot lan cuoi de dam bao Markdown hoan thien
                    el.innerHTML = marked.parse(el._rawText || el.textContent);
                }
            };

            process();
        }

        function appendMessage(role, text, sources = []) {
            const container = document.getElementById('messages');
            const wrap = document.createElement('div'); wrap.className = `message ${role}`;
            const sourcesHtml = sources.length ? `<div class="sources">${sources.map(s => `<span class="source-tag">📎 ${s}</span>`).join('')}</div>` : '';
            // Su dung marked cho lich su tin nhan
            const contentHtml = marked.parse(text);
            wrap.innerHTML = `<div class="avatar">${role === 'user' ? 'U' : 'D'}</div><div class="bubble-wrap"><div class="bubble">${contentHtml}</div>${sourcesHtml}</div>`;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        function showToast(msg, type = '') {
            const t = document.getElementById('toast'); t.textContent = msg;
            t.className = `toast ${type === 'accent' ? 'accent' : type === 'error' ? 'error-toast' : ''} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>'); }

        // Presence heartbeat: ket noi SSE de server dem online users
        let presenceSource = null;
        function connectPresence() {
            const tk = localStorage.getItem('token');
            if (!tk) return;
            if (presenceSource) { presenceSource.close(); presenceSource = null; }
            presenceSource = new EventSource(`http://localhost:8000/presence/ping?token=${encodeURIComponent(tk)}`);
            presenceSource.onerror = () => {
                presenceSource.close();
                presenceSource = null;
                setTimeout(connectPresence, 5000);
            };
        }
        window.addEventListener('beforeunload', () => { if (presenceSource) presenceSource.close(); });

        // Start
        initApp();
        // Ket noi presence sau khi app init (token co the chua co neu chua dang nhap)
        connectPresence();
        // Khi dang nhap thanh cong, ket noi lai
        document.addEventListener('userLoggedIn', connectPresence);
    </script>
</body>
