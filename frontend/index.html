<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMind — RAG Chatbot</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f12;
            --surface: #13161b;
            --surface2: #1a1e25;
            --border: rgba(255, 255, 255, 0.07);
            --border-bright: rgba(255, 255, 255, 0.14);
            --accent: #7ee8a2;
            --accent2: #4fd1c5;
            --text: #e8eaed;
            --text-muted: #6b7280;
            --text-dim: #9ca3af;
            --user-bubble: #1e2d24;
            --bot-bubble: #161a22;
            --danger: #f87171;
            --font-display: 'DM Serif Display', serif;
            --font-ui: 'Syne', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 272px;
            min-width: 272px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: -80px;
            left: -80px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(126, 232, 162, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo-title {
            font-family: var(--font-display);
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .6;
                transform: scale(.85);
            }
        }

        .logo-sub {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-top: 3px;
            font-family: var(--font-mono);
        }

        /* TABS */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 12px;
        }

        .tab {
            flex: 1;
            padding: 10px 4px;
            font-size: 11px;
            letter-spacing: .08em;
            text-transform: uppercase;
            font-family: var(--font-mono);
            color: var(--text-muted);
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all .15s;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* TAB PANELS */
        .tab-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .tab-panel.active {
            display: flex;
        }

        /* DOCS PANEL */
        .upload-wrap {
            padding: 14px 14px 10px;
        }

        .section-label {
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
            font-family: var(--font-mono);
        }

        .drop-zone {
            border: 1.5px dashed var(--border-bright);
            border-radius: 10px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            background: rgba(255, 255, 255, .015);
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(126, 232, 162, .04);
        }

        .drop-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon {
            font-size: 22px;
            margin-bottom: 5px;
            display: block;
            opacity: .6;
        }

        .drop-text {
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .drop-text span {
            color: var(--accent);
            font-weight: 600;
        }

        .upload-status {
            margin-top: 8px;
            font-size: 11px;
            font-family: var(--font-mono);
            padding: 7px 10px;
            border-radius: 6px;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .upload-status.loading {
            display: flex;
            background: rgba(126, 232, 162, .06);
            color: var(--accent);
            border: 1px solid rgba(126, 232, 162, .15);
        }

        .upload-status.success {
            display: flex;
            background: rgba(126, 232, 162, .06);
            color: var(--accent);
            border: 1px solid rgba(126, 232, 162, .15);
        }

        .upload-status.error {
            display: flex;
            background: rgba(248, 113, 113, .06);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, .15);
        }

        .spinner {
            width: 11px;
            height: 11px;
            border: 1.5px solid rgba(126, 232, 162, .3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .docs-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 14px 14px;
        }

        .docs-list::-webkit-scrollbar {
            width: 3px;
        }

        .docs-list::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 2px;
        }

        .doc-item {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 9px;
            border-radius: 7px;
            margin-bottom: 3px;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
            animation: fadeIn .3s ease;
        }

        .doc-name {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .doc-chunks {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--accent);
            background: rgba(126, 232, 162, .08);
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* CHATS PANEL */
        .new-chat-btn {
            margin: 12px 14px 8px;
            padding: 9px 14px;
            background: rgba(126, 232, 162, .08);
            border: 1px solid rgba(126, 232, 162, .2);
            border-radius: 8px;
            color: var(--accent);
            font-size: 12px;
            font-family: var(--font-ui);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all .15s;
            width: calc(100% - 28px);
        }

        .new-chat-btn:hover {
            background: rgba(126, 232, 162, .13);
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px;
        }

        .sessions-list::-webkit-scrollbar {
            width: 3px;
        }

        .sessions-list::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 2px;
        }

        .session-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 10px;
            border-radius: 8px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: all .15s;
            border: 1px solid transparent;
            group: true;
        }

        .session-item:hover {
            background: var(--surface2);
            border-color: var(--border);
        }

        .session-item.active {
            background: var(--surface2);
            border-color: rgba(126, 232, 162, .2);
        }

        .session-icon {
            font-size: 13px;
            flex-shrink: 0;
            opacity: .6;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 12px;
            color: var(--text-dim);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .session-item.active .session-title {
            color: var(--text);
        }

        .session-time {
            font-size: 10px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: 1px;
        }

        .session-del {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 12px;
            transition: all .15s;
            flex-shrink: 0;
        }

        .session-item:hover .session-del {
            opacity: 1;
        }

        .session-del:hover {
            color: var(--danger);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .main::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .015) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
            background: rgba(13, 15, 18, .85);
            backdrop-filter: blur(8px);
        }

        .chat-title {
            font-family: var(--font-display);
            font-size: 17px;
        }

        .chat-title em {
            color: var(--accent);
            font-style: italic;
        }

        .header-session {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            background: var(--surface2);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            z-index: 1;
        }

        .messages::-webkit-scrollbar {
            width: 3px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 2px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: .4;
            pointer-events: none;
            margin: auto;
        }

        .empty-icon {
            font-family: var(--font-display);
            font-size: 52px;
            font-style: italic;
            color: var(--text-muted);
            line-height: 1;
        }

        .empty-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
            max-width: 220px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: msgIn .22s ease;
            max-width: 88%;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .avatar {
            background: rgba(126, 232, 162, .15);
            border: 1px solid rgba(126, 232, 162, .25);
            color: var(--accent);
        }

        .message.bot .avatar {
            background: var(--surface2);
            border: 1px solid var(--border);
            font-family: var(--font-display);
            font-style: italic;
            color: var(--text-dim);
            font-size: 14px;
        }

        .bubble-wrap {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bubble {
            padding: 11px 15px;
            border-radius: 12px;
            font-size: 13.5px;
            line-height: 1.65;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            border: 1px solid rgba(126, 232, 162, .15);
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 13px 15px;
        }

        .typing span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.2s ease-in-out infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: .2s;
        }

        .typing span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: .4;
            }

            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        .sources {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 2px;
        }

        .source-tag {
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--accent2);
            background: rgba(79, 209, 197, .07);
            border: 1px solid rgba(79, 209, 197, .18);
            padding: 2px 7px;
            border-radius: 4px;
        }

        .input-area {
            padding: 14px 24px 18px;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 1;
            background: rgba(13, 15, 18, .9);
            backdrop-filter: blur(8px);
        }

        .input-row {
            display: flex;
            gap: 9px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 15px;
            color: var(--text);
            font-size: 13.5px;
            font-family: var(--font-ui);
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 120px;
            min-height: 44px;
            transition: border-color .15s;
            display: block;
            width: 100%;
        }

        textarea:focus {
            border-color: rgba(126, 232, 162, .3);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .15s;
            color: #0d0f12;
        }

        .send-btn:hover {
            background: #6ee09a;
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 17px;
            height: 17px;
        }

        .input-hint {
            font-size: 10px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: 7px;
            display: flex;
            gap: 12px;
        }

        .hint-key {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 9px;
        }

        .toast {
            position: fixed;
            bottom: 22px;
            right: 22px;
            background: var(--surface2);
            border: 1px solid var(--border-bright);
            color: var(--text);
            font-size: 12px;
            padding: 9px 14px;
            border-radius: 8px;
            font-family: var(--font-mono);
            z-index: 999;
            transform: translateY(60px);
            opacity: 0;
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
            pointer-events: none;
            max-width: 280px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.accent {
            border-color: rgba(126, 232, 162, .3);
            color: var(--accent);
        }

        .toast.error-toast {
            border-color: rgba(248, 113, 113, .3);
            color: var(--danger);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-title">
                <div class="logo-dot"></div>DocMind
            </div>
            <div class="logo-sub">RAG · Qdrant · Llama 3.3</div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chats')">Chats</button>
            <button class="tab" onclick="switchTab('docs')">Documents</button>
        </div>

        <!-- CHATS PANEL -->
        <div class="tab-panel active" id="panel-chats">
            <button class="new-chat-btn" onclick="newChat()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                New chat
            </button>
            <div class="sessions-list" id="sessionsList"></div>
        </div>

        <!-- DOCS PANEL -->
        <div class="tab-panel" id="panel-docs">
            <div class="upload-wrap">
                <span class="section-label">Upload PDF</span>
                <div class="drop-zone" id="dropZone">
                    <input type="file" accept=".pdf" id="fileInput">
                    <span class="drop-icon">📄</span>
                    <div class="drop-text"><span>Chọn file</span> hoặc kéo thả</div>
                </div>
                <div class="upload-status" id="uploadStatus"></div>
            </div>
            <div class="section-label" style="padding:0 14px;">Đã upload</div>
            <div class="docs-list" id="docsList"></div>
        </div>
    </aside>

    <main class="main">
        <div class="chat-header">

            <div class="header-session" id="headerSession">Chưa có session</div>
        </div>

        <div class="messages" id="messages">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">?</div>
                <div class="empty-text">Tạo chat mới và upload tài liệu để bắt đầu</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <textarea id="questionInput" placeholder="Hỏi về nội dung tài liệu..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <div class="input-hint">
                <span><span class="hint-key">Enter</span> gửi</span>
                <span><span class="hint-key">Shift+Enter</span> xuống dòng</span>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const API = 'http://localhost:8000';
        let currentSessionId = null;
        const uploadedDocs = [];

        // ── TABS ──
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['chats', 'docs'][i] === name));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + name).classList.add('active');
        }

        // ── TEXTAREA ──
        const ta = document.getElementById('questionInput');
        ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; });
        ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

        // ── DRAG & DROP ──
        const dz = document.getElementById('dropZone');
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f?.type === 'application/pdf') uploadFile(f); else showToast('Chỉ hỗ trợ PDF', 'error'); });
        document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });

        async function uploadFile(file) {
            const st = document.getElementById('uploadStatus');
            st.className = 'upload-status loading'; st.innerHTML = '<div class="spinner"></div> Đang xử lý...';
            const form = new FormData(); form.append('file', file);
            try {
                const res = await fetch(`${API}/ingest`, { method: 'POST', body: form });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Thất bại');
                st.className = 'upload-status success'; st.innerHTML = `✓ ${data.chunks_stored} chunks`;
                if (!uploadedDocs.includes(file.name)) {
                    uploadedDocs.push(file.name);
                    const item = document.createElement('div'); item.className = 'doc-item';
                    item.innerHTML = `<span>📄</span><span class="doc-name" title="${file.name}">${file.name}</span><span class="doc-chunks">${data.chunks_stored}</span>`;
                    document.getElementById('docsList').appendChild(item);
                }
                showToast(`Đã ingest "${file.name}"`, 'accent');
            } catch (err) { st.className = 'upload-status error'; st.innerHTML = `✗ ${err.message}`; showToast(err.message, 'error'); }
            document.getElementById('fileInput').value = '';
        }

        // ── SESSIONS ──
        async function loadSessions() {
            try {
                const res = await fetch(`${API}/sessions`);
                const sessions = await res.json();
                renderSessions(sessions);
            } catch { }
        }

        function renderSessions(sessions) {
            const list = document.getElementById('sessionsList');
            list.innerHTML = '';
            if (!sessions.length) {
                list.innerHTML = '<div style="padding:16px 10px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);text-align:center;">Chưa có cuộc trò chuyện</div>';
                return;
            }
            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                item.dataset.id = s.id;
                const date = new Date(s.created_at);
                const timeStr = date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
                item.innerHTML = `
      <span class="session-icon">💬</span>
      <div class="session-info">
        <div class="session-title">${escHtml(s.title)}</div>
        <div class="session-time">${timeStr}</div>
      </div>
      <button class="session-del" onclick="deleteSession(event,'${s.id}')">✕</button>
    `;
                item.addEventListener('click', () => loadSession(s.id, s.title));
                list.appendChild(item);
            });
        }

        async function loadSession(id, title) {
            currentSessionId = id;
            document.getElementById('headerSession').textContent = title;
            document.querySelectorAll('.session-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));

            try {
                const res = await fetch(`${API}/history/${id}`);
                const data = await res.json();
                const container = document.getElementById('messages');
                container.innerHTML = '';
                if (!data.messages.length) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">?</div><div class="empty-text">Chưa có tin nhắn trong session này</div></div>';
                    return;
                }
                data.messages.forEach(m => {
                    appendMessage(m.role === 'user' ? 'user' : 'bot', m.content);
                });
            } catch { }
        }

        function newChat() {
            const id = 'session-' + Date.now();
            currentSessionId = id;
            document.getElementById('headerSession').textContent = id;
            document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">?</div><div class="empty-text">Bắt đầu đặt câu hỏi về tài liệu</div></div>';
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            document.getElementById('questionInput').focus();
        }

        async function deleteSession(e, id) {
            e.stopPropagation();
            await fetch(`${API}/history/${id}`, { method: 'DELETE' });
            if (currentSessionId === id) {
                currentSessionId = null;
                document.getElementById('headerSession').textContent = 'Chưa có session';
                document.getElementById('messages').innerHTML = '<div class="empty-state"><div class="empty-icon">?</div><div class="empty-text">Tạo chat mới và upload tài liệu để bắt đầu</div></div>';
            }
            loadSessions();
            showToast('Đã xóa session', 'accent');
        }

        // ── CHAT ──
        async function sendMessage() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;
            if (!currentSessionId) { showToast('Tạo New Chat trước nhé!', 'error'); return; }

            document.getElementById('emptyState')?.remove();
            appendMessage('user', question);
            input.value = ''; input.style.height = 'auto';

            const typingId = appendTyping();
            document.getElementById('sendBtn').disabled = true;

            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, session_id: currentSessionId, top_k: 5 }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Lỗi server');
                removeTyping(typingId);
                appendMessage('bot', data.answer, data.sources);
                loadSessions(); // refresh list để cập nhật title
            } catch (err) {
                removeTyping(typingId);
                appendMessage('bot', `⚠️ ${err.message}`);
            }
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function appendMessage(role, text, sources = []) {
            const container = document.getElementById('messages');
            const wrap = document.createElement('div'); wrap.className = `message ${role}`;
            const sourcesHtml = sources.length ? `<div class="sources">${sources.map(s => `<span class="source-tag">📎 ${s}</span>`).join('')}</div>` : '';
            wrap.innerHTML = `<div class="avatar">${role === 'user' ? 'U' : 'D'}</div><div class="bubble-wrap"><div class="bubble">${escHtml(text)}</div>${sourcesHtml}</div>`;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        function appendTyping() {
            const container = document.getElementById('messages');
            const id = 'typing-' + Date.now();
            const wrap = document.createElement('div'); wrap.className = 'message bot'; wrap.id = id;
            wrap.innerHTML = '<div class="avatar">D</div><div class="bubble-wrap"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
            container.appendChild(wrap); container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeTyping(id) { document.getElementById(id)?.remove(); }

        function showToast(msg, type = '') {
            const t = document.getElementById('toast'); t.textContent = msg;
            t.className = `toast ${type === 'accent' ? 'accent' : type === 'error' ? 'error-toast' : ''} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>'); }

        // Init
        loadSessions();
    </script>
</body>

</html>
